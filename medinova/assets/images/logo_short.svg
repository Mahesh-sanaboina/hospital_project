<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <defs>
    <!-- Gradients matching the logo artwork -->
    <linearGradient id="maleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#738f8b" />
      <stop offset="100%" stop-color="#4d6662" />
    </linearGradient>
    <linearGradient id="femaleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dba2a5" />
      <stop offset="100%" stop-color="#bf7579" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#aa7c11" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- LEFT ICON SYMBOL -->
    <g id="logo-icon" transform="translate(0, 15)">
      <!-- Male Symbol (Mars) with Male Face Silhouette -->
      <path d="M 120,110 
               C 120,60 70,20 20,40 
               C -20,55 -25,110 10,140 
               C 40,165 90,160 110,130" 
            fill="none" stroke="url(#maleGrad)" stroke-width="8" stroke-linecap="round" />
      
      <!-- Male Arrow -->
      <path d="M 95,50 L 130,15 M 105,15 L 130,15 L 130,40" 
            fill="none" stroke="url(#maleGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Male Face Silhouette (inside the left loop) -->
      <path d="M 60,70 
               C 65,70 70,72 73,75 
               C 73,78 70,80 67,82 
               C 72,87 75,90 70,95 
               C 67,98 62,97 60,100 
               C 62,105 65,110 65,115 
               C 65,120 60,123 55,125" 
            fill="none" stroke="url(#maleGrad)" stroke-width="3" stroke-linecap="round" />

      <!-- Stylized K with Fertility Element / Loop in the Center -->
      <!-- Vertical stem of K -->
      <path d="M 135,70 L 135,155" 
            fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" />
      <!-- Upper diagonal of K -->
      <path d="M 135,112 L 180,72" 
            fill="none" stroke="url(#goldGrad)" stroke-width="10" stroke-linecap="round" />
      <!-- Lower diagonal with infinity-style loop and spoon-end -->
      <path d="M 135,112 
               C 155,130 170,140 195,130 
               C 210,124 215,110 205,98 
               C 195,88 175,98 160,115" 
            fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
      <circle cx="205" cy="98" r="9" fill="url(#goldGrad)" />

      <!-- Female Symbol (Venus) with Female Face Silhouette -->
      <path d="M 210,110 
               C 210,60 260,35 300,60 
               C 340,85 345,135 315,160 
               C 285,185 240,175 220,145" 
            fill="none" stroke="url(#femaleGrad)" stroke-width="8" stroke-linecap="round" />
      
      <!-- Female Cross -->
      <path d="M 235,145 L 210,175 M 205,155 L 225,170" 
            fill="none" stroke="url(#femaleGrad)" stroke-width="8" stroke-linecap="round" />
      
      <!-- Female Face Silhouette (inside the right loop) -->
      <path d="M 270,72 
               C 265,72 260,75 258,78 
               C 258,81 261,83 264,85 
               C 259,90 257,93 261,98 
               C 264,101 268,100 270,103 
               C 268,108 266,113 266,118 
               C 266,123 271,126 276,128" 
            fill="none" stroke="url(#femaleGrad)" stroke-width="3" stroke-linecap="round" />
    </g>

    <!-- VERTICAL DIVIDER LINE -->
    <line x1="365" y1="35" x2="365" y2="195" stroke="#bfa36c" stroke-width="3" stroke-linecap="round" />

    <!-- RIGHT TEXT SECTION -->
    <g transform="translate(400, 45)">
      <!-- Kimaya -->
      <text x="0" y="80" 
            font-family="'Playfair Display', 'Didot', 'Georgia', serif" 
            font-size="86px" 
            font-weight="bold" 
            fill="#bfa36c" 
            letter-spacing="1px">Kimaya</text>
    </g>
  </g>
</svg>
